<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline - LeadFlow CRM</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pipeline.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="layers"></i>
                <span>LeadFlow CRM</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="leadler.html" class="nav-item"><i data-lucide="users"></i> Leadler</a>
                <a href="skorlama.html" class="nav-item"><i data-lucide="activity"></i> Skorlama</a>
                <a href="pipeline.html" class="nav-item active"><i data-lucide="kanban"></i> Satış Pipeline</a>
                <a href="iletisim.html" class="nav-item"><i data-lucide="message-square"></i> Nurturing</a>
                <a href="gorevler.html" class="nav-item"><i data-lucide="check-square"></i> Görevler</a>
                <a href="raporlama.html" class="nav-item"><i data-lucide="bar-chart-2"></i> Raporlama</a>
                <a href="kampanya_onerileri.html" class="nav-item"><i data-lucide="lightbulb"></i> Öneriler</a>
                <a href="kullanici_yonetimi.html" class="nav-item"><i data-lucide="user-cog"></i> Kullanıcılar</a>
                <a href="genel_tanimlar.html" class="nav-item"><i data-lucide="settings"></i> Ayarlar</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h2>Satış Pipeline</h2>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-outline"><i data-lucide="filter"></i> Filtrele</button>
                    <div class="action-icon notification-icon" onclick="openNotifications(event)">
                        <i data-lucide="bell"></i>
                        <span class="badge" style="display:none;" id="notificationCountText">0</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content" style="padding-right:0; overflow:hidden;">
                
                <div class="kanban-board">
                    <!-- Column 1 -->
                    <div class="kanban-column">
                        <div class="kanban-header">
                            <span class="kanban-title">Yeni</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body"></div>
                    </div>
                    
                    <!-- Column 2 -->
                    <div class="kanban-column">
                        <div class="kanban-header">
                            <span class="kanban-title">Skorlandı</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body"></div>
                    </div>

                    <!-- Column 3 -->
                    <div class="kanban-column">
                        <div class="kanban-header">
                            <span class="kanban-title">Nurturing</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body"></div>
                    </div>

                    <!-- Column 4 -->
                    <div class="kanban-column">
                        <div class="kanban-header">
                            <span class="kanban-title">Satışa Hazır</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body"></div>
                    </div>

                    <!-- Column 5 -->
                    <div class="kanban-column">
                        <div class="kanban-header">
                            <span class="kanban-title">Kazanıldı</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body" style="background-color: rgba(45, 106, 79, 0.05);"></div>
                    </div>
                    
                    <!-- Column 6 -->
                    <div class="kanban-column" style="margin-right:20px;">
                        <div class="kanban-header">
                            <span class="kanban-title">Kaybedildi</span>
                            <span class="kanban-count">0</span>
                        </div>
                        <div class="kanban-body" style="background-color: rgba(230, 57, 70, 0.05);"></div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="site.js"></script>
    <script>
        $(document).ready(function() {
            lucide.createIcons();
            loadPipelinePage();
        });

        function moveNext(btn) {
            var card = $(btn).closest('.kanban-card');
            var currentColumn = card.closest('.kanban-column');
            var nextColumn = currentColumn.next('.kanban-column');
            if(nextColumn.length > 0) {
                nextColumn.find('.kanban-body').append(card);
            }
        }
        function moveToLost(btn) {
            var card = $(btn).closest('.kanban-card');
            var lostColumn = $('.kanban-column:last-child');
            lostColumn.find('.kanban-body').append(card);
        }
    </script>
</body>
</html>

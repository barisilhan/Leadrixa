<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow CRM - Giriş Yap</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
        }
        .login-box {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="login-logo">
                <i data-lucide="layers" style="width: 32px; height: 32px;"></i>
                LeadFlow CRM
            </div>
            <form id="loginForm">
                <div class="form-group" style="text-align: left;">
                    <label>E-posta Adresi</label>
                    <input type="email" id="email" class="form-control" required placeholder="admin@leadrixa.local">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom:24px;">
                    <label>Şifre</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Giriş Yap</button>
            </form>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="site.js"></script>
    <script>$(document).ready(function() { lucide.createIcons(); });</script>
</body>
</html>

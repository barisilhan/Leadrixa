<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görevler - LeadFlow CRM</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gorevler.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="layers"></i>
                <span>LeadFlow CRM</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="leadler.html" class="nav-item"><i data-lucide="users"></i> Leadler</a>
                <a href="skorlama.html" class="nav-item"><i data-lucide="activity"></i> Skorlama</a>
                <a href="pipeline.html" class="nav-item"><i data-lucide="kanban"></i> Satış Pipeline</a>
                <a href="iletisim.html" class="nav-item"><i data-lucide="message-square"></i> Nurturing</a>
                <a href="gorevler.html" class="nav-item active"><i data-lucide="check-square"></i> Görevler</a>
                <a href="raporlama.html" class="nav-item"><i data-lucide="bar-chart-2"></i> Raporlama</a>
                <a href="kampanya_onerileri.html" class="nav-item"><i data-lucide="lightbulb"></i> Öneriler</a>
                <a href="kullanici_yonetimi.html" class="nav-item"><i data-lucide="user-cog"></i> Kullanıcılar</a>
                <a href="genel_tanimlar.html" class="nav-item"><i data-lucide="settings"></i> Ayarlar</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h2>Görev Yönetimi</h2>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" onclick="$('#taskModal').show()"><i data-lucide="plus"></i> Yeni Görev</button>
                    <div class="action-icon notification-icon" onclick="openNotifications(event)">
                        <i data-lucide="bell"></i>
                        <span class="badge" style="display:none;" id="notificationCountText">0</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content">
                
                <div class="page-title" style="margin-bottom: 24px;">
                    <p>Görevlerinizi ve takım aktivitelerinizi yönetin.</p>
                </div>

                <div class="task-list">
                    <!-- Tasks injected by site.js loadTasksPage -->
                </div>

            </main>
        </div>
    </div>

    <!-- New Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Görev Oluştur</h3>
                <button class="btn-ghost" onclick="$('#taskModal').hide()"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-group">
                        <label>Görev Başlığı</label>
                        <input type="text" id="taskTitle" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Açıklama</label>
                        <textarea id="taskDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Öncelik</label>
                        <select id="taskPriority" class="form-control">
                            <option value="Düşük">Düşük</option>
                            <option value="Orta" selected>Orta</option>
                            <option value="Yüksek">Yüksek</option>
                            <option value="Acil">Acil</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Atanan Kişi</label>
                        <input type="text" id="taskAssignedTo" class="form-control" value="Admin User">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="$('#taskModal').hide()">İptal</button>
                <button type="button" class="btn btn-primary" onclick="$('#taskForm').submit()">Görev Ekle</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="site.js"></script>
    <script>
        $(document).ready(function() {
            lucide.createIcons();
            loadTasksPage();
            $(document).ajaxComplete(function() { lucide.createIcons(); });
        });
    </script>
</body>
</html>

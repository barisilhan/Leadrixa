<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Leadrixa CRM</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-logo">
            <!-- Temel logoya benzeyen CSS ikonu -->
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 13h4v8H3v-8zm6-6h4v14H9V7zm6-4h4v18h-4V3z" fill="#F4A261"/>
            </svg>
        </div>
        
        <h2>Welcome to Leadrixa CRM</h2>
        <p>Sign in to continue</p>
        
        <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-container">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-container">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">Sign in</button>
            
            <div class="login-footer">
                <a href="#">Forgot password?</a>
                <!-- Sign up is intentionally removed as per analysis -->
            </div>
        </form>
    </div>

</body>
</html>

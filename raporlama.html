<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raporlama - LeadFlow CRM</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="layers"></i>
                <span>LeadFlow CRM</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="leadler.html" class="nav-item"><i data-lucide="users"></i> Leadler</a>
                <a href="skorlama.html" class="nav-item"><i data-lucide="activity"></i> Skorlama</a>
                <a href="pipeline.html" class="nav-item"><i data-lucide="kanban"></i> Satış Pipeline</a>
                <a href="iletisim.html" class="nav-item"><i data-lucide="message-square"></i> Nurturing</a>
                <a href="gorevler.html" class="nav-item"><i data-lucide="check-square"></i> Görevler</a>
                <a href="raporlama.html" class="nav-item active"><i data-lucide="bar-chart-2"></i> Raporlama</a>
                <a href="kampanya_onerileri.html" class="nav-item"><i data-lucide="lightbulb"></i> Öneriler</a>
                <a href="kullanici_yonetimi.html" class="nav-item"><i data-lucide="user-cog"></i> Kullanıcılar</a>
                <a href="genel_tanimlar.html" class="nav-item"><i data-lucide="settings"></i> Ayarlar</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h2>Raporlama & Analiz</h2>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-outline"><i data-lucide="download"></i> Dışa Aktar</button>
                    <div class="action-icon notification-icon" onclick="openNotifications(event)">
                        <i data-lucide="bell"></i>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Dönüşüm Hunisi</span>
                    </div>
                    <div style="padding:40px; text-align:center; color:var(--text-muted);">
                        <i data-lucide="bar-chart" style="width:48px; height:48px; margin-bottom:16px;"></i>
                        <p>Detaylı raporlama modülü yapım aşamasındadır.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="site.js"></script>
    <script>$(document).ready(function() { lucide.createIcons(); });</script>
</body>
</html>
